<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Archive Startpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans', sans-serif;
            /* Latar Belakang Gambar Resmi Blue Archive */
            background: #000 url('https://nxm-clw-cdn.dn.nexoncdn.co.kr/bluearchive/img/brand/loop_bg_en.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Jam & Tanggal - Pojok Kiri Atas */
        #top-left-info {
            position: absolute;
            top: 5%;
            left: 5%;
            color: white;
            text-shadow: 0px 2px 8px rgba(0,0,0,0.5);
            opacity: 0.8; 
            transition: opacity 0.3s;
        }
        #top-left-info:hover {
            opacity: 1;
        }

        #clock {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
        }

        #date {
            font-size: 1.2rem;
            opacity: 0.9;
            /* Margin kiri 16px membuat tanggal bergeser ke kanan terpisah dari baris jam */
            margin: 5px 0 0 16px; 
        }

        /* Wadah Kontrol Pojok Kanan Atas (Menyusun Tombol Kebawah) */
        .top-right-controls {
            position: absolute;
            top: 5%;
            right: 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px; /* Jarak antara tombol musik dan fullscreen */
            z-index: 10;
        }

        /* Desain Umum Tombol Kontrol Atas */
        .control-btn {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.25); 
            color: white;
            border-radius: 50px;
            font-weight: bold;
            backdrop-filter: blur(2px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Tombol Musik (Default: OFF, Transparan 0.4) */
        #music-btn {
            opacity: 0.4; 
        }
        #music-btn:hover, #music-btn:active {
            opacity: 0.9;
        }

        /* Tombol Fullscreen (Sesuai Permintaan: Opacity 0.2) */
        #fullscreen-btn {
            opacity: 0.2; 
        }
        #fullscreen-btn:hover, #fullscreen-btn:active {
            opacity: 0.9; /* Menjadi jelas saat disentuh/di-hover */
        }

        /* Container Utama di Tengah (Membungkus Ikon Atas & Search) */
        .main-center-container {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            z-index: 5;
        }

        /* Barisan Ikon di Atas Search Panel */
        .top-avatar-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        /* Kolom Pencarian Google (Super Transparan) */
        .search-container {
            width: 100%;
        }

        .search-bar {
            width: 100%;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 30px;
            font-size: 16px;
            color: white;
            outline: none;
            backdrop-filter: blur(2px);
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center; 
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .search-bar:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Barisan Ikon di Bawah (Media Sosial & AI) */
        .bottom-bar {
            position: absolute;
            bottom: 8%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        /* Aturan Umum Bingkai Ikon (Tanpa Border) */
        .icon-link {
            display: inline-block;
            width: 58px;
            height: 58px;
            border-radius: 14px;
            overflow: hidden; 
            border: none;
            transition: transform 0.2s ease;
        }

        .icon-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8; 
            transition: opacity 0.2s ease;
        }

        /* Efek Zoom Padat Khusus untuk Ikon Arona (Scale 1.9) */
        .arona-zoom img {
            transform: scale(1.9); 
        }

        /* Efek Interaksi Saat Ikon Disentuh/Ditekan */
        .icon-link:active img, .icon-link:hover img {
            opacity: 1;
        }
        
        .icon-link:active, .icon-link:hover {
            transform: scale(1.1); 
        }
    </style>
</head>
<body>

    <audio id="bgm">
        <source src="https://raw.githubusercontent.com/Guralt/Startpage/main/bluearchive_bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="top-left-info">
        <p id="clock">00:00</p>
        <p id="date">Memuat...</p>
    </div>

    <div class="top-right-controls">
        <button id="music-btn" class="control-btn" onclick="toggleMusic()">🎵​</button>
        <button id="fullscreen-btn" class="control-btn" onclick="toggleFullscreen()">⛶</button>
    </div>

    <div class="main-center-container">
        
        <div class="top-avatar-bar">
            <a href="https://bluearchive.fandom.com/wiki/Blue_Archive_Wiki" class="icon-link" title="Plana Wiki">
                <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/Plana_Halo.webp" alt="Plana">
            </a>

            <a href="https://bluearchive.wiki/wiki/Main_Page" class="icon-link arona-zoom" title="Arona Wiki">
                <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/Arona_Halo.webp" alt="Arona">
            </a>
        </div>

        <div class="search-container">
            <form action="https://www.google.com/search" method="get">
                <input type="text" name="q" class="search-bar" placeholder="Search" required autocomplete="off">
            </form>
        </div>

    </div>

    <div class="bottom-bar">
        <a href="https://facebook.com" class="icon-link" title="Facebook">
            <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/Facebook.png" alt="Facebook">
        </a>
        
        <a href="https://music.youtube.com" class="icon-link" title="YouTube Music">
            <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/ytmusic.png" alt="YT Music">
        </a>

        <a href="https://aistudio.google.com/" class="icon-link" title="Google AI Studio">
            <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/aistudio.png" alt="Google AI Studio">
        </a>

        <a href="https://gemini.google.com/" class="icon-link" title="Google Gemini">
            <img src="https://raw.githubusercontent.com/Guralt/Startpage/main/Google-gemini-icon.svg.png" alt="Google Gemini">
        </a>
    </div>

    <script>
        // Jam & Tanggal Real-time
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('clock').innerText = timeStr;
            document.getElementById('date').innerText = dateStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Kontrol Musik (Manual OFF)
        const music = document.getElementById('bgm');
        const musicBtn = document.getElementById('music-btn');
        
        function toggleMusic() {
            if (music.paused) {
                music.play().catch(error => { console.log("Playback blocked:", error); });
                musicBtn.innerText = "🎵​";
                musicBtn.style.background = "rgba(70, 90, 115, 0.2)"; 
            } else {
                music.pause();
                musicBtn.innerText = "🎵";
                musicBtn.style.background = "rgba(255, 255, 255, 0.1)"; 
            }
        }

        /* LOGIKA SEAMLESS LOOPING (4 Detik Sebelum Habis) */
        music.addEventListener('timeupdate', function() {
            if (this.duration && this.currentTime >= (this.duration - 4)) {
                this.currentTime = 0;
                this.play().catch(error => { console.log("Loop error:", error); });
            }
        });

        /* LOGIKA TOGGLE FULLSCREEN */
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Gagal mengaktifkan Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
